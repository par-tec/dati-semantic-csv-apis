---
#
# docker-compose up -d dev
#
services:
  dev:
    build:
      context: .
      target: dev
    working_dir: /code
    volumes:
    - .:/code

  test:
    build:
      context: .
      target: test

  api-catalog:
    build:
      context: .
      dockerfile: apiv1/Dockerfile
      target: catalog-api
    ports:
    - "8000:8080"
    volumes:
    - ./tests/api/vocabularies.linkset.yaml:/app/vocabularies.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  api-data:
    build:
      context: .
      dockerfile: apiv1/Dockerfile
      target: data-api
    environment:
    - HARVEST_DB=/data/harvest.db
    - API_BASE_URL=http://localhost:8001
    ports:
    - "8001:8080"
    volumes:
    - ./assets:/assets:ro
    - ./apiv1/tests/data/:/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
