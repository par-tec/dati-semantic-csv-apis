#
# Run pre-commit hooks. You can run them without installing
#  the hook with
#
# $ pre-commit run --all-files
#
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_stages:
  - pre-commit
  - manual
  - pre-push
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  # Manage spaces.
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-added-large-files
  - id: check-symlinks
  - id: mixed-line-ending
    args: [--fix=lf]
    exclude: 'tests/data/snapshots/.*\.csv'
  # Check file syntax/format
  - id: check-xml
  - id: check-json
  - id: check-yaml
    args: [--allow-multiple-documents]
  # Security checks.
  - id: detect-private-key
  - id: detect-aws-credentials
    args:
    # See https://github.com/pre-commit/pre-commit-hooks/issues/174
    - --allow-missing-credentials
- repo: https://github.com/google/yamlfmt
  rev: v0.21.0
  hooks:
  - id: yamlfmt
    files: \.(yaml|yml)$
    exclude: '.spectral|config\.yaml|apiv1/openapi|tests/data/snapshots/.*\.yaml'
- repo: https://github.com/executablebooks/mdformat
  rev: 0.7.17
  hooks:
  - id: mdformat
    exclude: '.github/.*|docs/glossario.md'
    additional_dependencies:
    - mdformat-tables
    - mdformat-gfm
#
# Python linters.
#
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.1
  hooks:
  # Run the linter.
  - id: ruff
    args: [--fix]
  - # Run the formatter.
    id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
  - id: mypy
    additional_dependencies: [types-PyYAML]
    exclude: ^tests/
#
# Generators.
#
- repo: local
  hooks:
  - id: generate-bundles
    name: Generate OAS bundles
    stages:
    - manual
    language: docker_image
    files: apiv1/catalog/open.*yaml
    entry: |-
      --entrypoint sh
      docker.io/redocly/cli:2.20.3
      -c
      'mkdir -p apiv1/openapi/
      for f in $0 $@; \
      do
        DIR=${f%/*}
        redocly bundle \
          "$f" \
        -o "apiv1/openapi/${DIR##*/}.yaml"
      done'
#
# Security linters.
#
- repo: https://github.com/bridgecrewio/checkov.git
  rev: 3.2.504  # change to tag or sha
  hooks:
  - id: checkov
    # OAS files are linted with Spectral.
    exclude: 'apiv1/openapi'
  - id: checkov_secrets
    stages: ["pre-push"]
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: v1.22.0
  hooks:
    - id: zizmor
      stages: ["pre-push"]
- repo: local
  hooks:
  - id: trufflehog
    name: TruffleHog
    description: Detect secrets in your data.
    entry: bash -c 'docker run -c 2 --rm -v "$(pwd):/workdir" -i --rm
      docker.io/trufflesecurity/trufflehog:latest git file:///workdir --since-commit
      HEAD --results=verified,unknown --fail'
    language: system
    stages: ["pre-push"]
  - id: spectral
    name: Spectral
    language: system
    description: Validate OpenAPI specifications with Spectral.
    # choices: "error", "warn", "info", "hint"
    entry: >-
      bash -c 'docker run --rm -v "$(pwd):/workdir" -w /workdir -i --rm
      docker.io/stoplight/spectral:latest
      lint -F hint -vvv --ruleset .spectral/rulesets/.openapirc.yml "$@"' --
    files: >-
      apiv1/openapi/.*\.(yaml|yml)$
    stages:
    - manual
