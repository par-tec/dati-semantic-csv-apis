properties:
  id:
    minLength: 1
    pattern: >-
      ^[A-Za-z0-9._-]+$
    type: string
  label_it:
    maxLength: 500
    minLength: 1
    type: string
  level:
    maximum: 10
    minimum: 0
    type: integer
  parent:
    items:
      properties:
        url: &id001
          format: uri
          type: string
      required:
      - url
      type: object
    type: array
  url: *id001
  vocab:
    items:
      properties:
        url: *id001
      required:
      - url
      type: object
    type: array
required:
- id
- label_it
- level
- parent
- url
- vocab
type: object
