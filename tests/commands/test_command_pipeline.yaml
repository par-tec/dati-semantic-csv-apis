---
- id: pipeline_agente_causale

  marks:
  - asset
  description: |-
    Given:
    - a TTL file
    - a JSON-LD frame

    When:
    - I execute the `jsonld create` command
    - I execute the `datapackage create` command
    - I execute the `csv create` command

    Then:
    - all commands exit successfully
    - the output CSV file contains the expected number of items

  steps:
  - description: |-
      When:
      - I run the `jsonld create` command

      Then:
      - the command exits successfully
      - the output JSON-LD file contains the expected number of items
    command:
    - jsonld
    - create
    - --ttl
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.ttl
    - --frame
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.frame.yamlld
    - --vocabulary-uri
    - https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
    - --frame-only
    - --output
    - tests/data/snapshots/agente_causale/agente_causale.data.yamlld
    - --force
    expected:
      exit_status: 0
      files:
      - path: tests/data/snapshots/agente_causale/agente_causale.data.yamlld
        snapshot: tests/data/snapshots/agente_causale/agente_causale.data.yamlld
        compare: data
      logs:
      - >-
        Dataset contains .+ items, processing without batching
      - >-
        Batched framing completed, total items: .+
  - command:
    - jsonld
    - validate
    - --vocabulary-uri
    - https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
    - --ttl
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.ttl
    - --jsonld
    - tests/data/snapshots/agente_causale/agente_causale.data.yamlld
    expected: {}
  - description: |-
      When:
      - I run `datapackage create`

      Then:
      - the command exits successfully
      - a datapackage stub YAML file is created
      - logs show the datapackage stub was created
    command:
    - datapackage
    - create
    - --ttl
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.ttl
    - --frame
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.frame.yamlld
    - --vocabulary-uri
    - https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
    - --output
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    - --force
    expected:
      files:
      - path: tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
        snapshot: tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
        compare: data
      logs:
      - >-
        Datapackage stub created: .*tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
      stdout:
      - >-
        Creating datapackage metadata for https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
      - >-
        ✓ Created: .*tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
  - description: |-
      When:
      - I run `datapackage validate` on the created datapackage stub

      Then:
      - the command exits successfully
      - validation passes
    command:
    - datapackage
    - validate
    - --datapackage
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    expected:
      stdout:
      - >-
        ✓ Datapackage validation passed
  - description: |-
      When:
      - I run the `csv create` command

      Then:
      - the command exits successfully
      - the output CSV file contains the expected items
    command:
    - csv
    - create
    - --datapackage
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    - --jsonld
    - tests/data/snapshots/agente_causale/agente_causale.data.yamlld
    - --output
    - tests/data/snapshots/agente_causale/agente_causale.csv
    - --force
    expected:
      files:
      - path: tests/data/snapshots/agente_causale/agente_causale.csv
        snapshot: tests/data/snapshots/agente_causale/agente_causale.csv
      logs:
      - >-
        CSV file created successfully at .*agente_causale.csv
      stdout:
      - >-
        Created: .*/agente_causale.csv
  - description: |-
      When:
      - I run `csv validate` on the created CSV file

      Then:
      - the command exits successfully
      - validation passes
    command:
    - csv
    - validate
    - --vocabulary-uri
    - https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
    - --ttl
    - assets/controlled-vocabularies/agente_causale/latest/agente_causale.ttl
    - --datapackage
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    expected:
      logs:
      - >-
        Vocabulary URI https://w3id.org/italia/stat/controlled-vocabulary/agente_causale
        found in original RDF graph
      - >-
        CSV-derived RDF graph has .+ triples
      stdout:
      - >-
        CSV roundtrip validation passed with .+ rows and .+
        triples

